name: Deploy pipeline
on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/gateway/**"
      - "apps/web/**"
      - "packages/**"
      - "infra/kubernetes/**"
  pull_request:
    branches: [main]

env:
  REGISTRY: registry.cloud.martinpetr.dev

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Generate image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ github.event_name == "push" && github.ref == "refs/heads/main" }}
          tags: ${{ env.REGISTRY }}/matterchat/api:${{ steps.tag.outputs.tag }}, ${{ env.REGISTRY}}/matterchat/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/gateway/Dockerfile
          push: ${{ github.event_name == "push" && github.ref == "refs/heads/main" }}
          tags: ${{ env.REGISTRY }}/matterchat/gateway:${{ steps.tag.outputs.tag }}, ${{ env.REGISTRY}}/matterchat/gateway:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ github.event_name == "push" && github.ref == "refs/heads/main" }}
          tags: ${{ env.REGISTRY }}/matterchat/web:${{ steps.tag.outputs.tag }}, ${{ env.REGISTRY}}/matterchat/web:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Update manifests & commit
        if: github.event_name == "push" && github.ref == "refs/heads/main"
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Replace old tags with the newly built SHA tag
          sed -i "s|image: ${{ env.REGISTRY }}/matterchat/api:.*|image: ${{ env.REGISTRY }}/matterchat/api:${TAG}|g" infra/kubernetes/api.yaml
          sed -i "s|image: ${{ env.REGISTRY }}/matterchat/gateway:.*|image: ${{ env.REGISTRY }}/matterchat/gateway:${TAG}|g" infra/kubernetes/gateway.yaml
          sed -i "s|image: ${{ env.REGISTRY }}/matterchat/web:.*|image: ${{ env.REGISTRY }}/matterchat/web:${TAG}|g" infra/kubernetes/web.yaml

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/kubernetes/

          if ! git diff --staged --quiet; then
            git commit -m "chore(gitops): update image tags to ${TAG} [skip ci]"
            git push
          fi
