name: Deploy pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: registry.cloud.martinpetr.dev

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/api'
              - 'apps/api/**'
              - 'packages/contracts/**'
              - 'packages/config/**'
              - 'packages/database/**'
              - '.github/workflows/deploy.yaml'
            gateway:
              - 'apps/gateway'
              - 'apps/gateway/**'
              - 'packages/contracts/**'
              - 'packages/config/**'
              - '.github/workflows/deploy.yaml'
            web:
              - 'apps/web'
              - 'apps/web/**'
              - 'packages/contracts/**'
              - 'packages/config/**'
              - '.github/workflows/deploy.yaml'
            db-migration:
              - 'packages/database'
              - 'packages/database/**'
              - 'packages/config/**'
              - '.github/workflows/deploy.yaml'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Generate image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build & push API
        if: steps.filter.outputs.api == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/matterchat/api:${{ steps.tag.outputs.tag }}, ${{ env.REGISTRY }}/matterchat/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push gateway
        if: steps.filter.outputs.gateway == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/gateway/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/matterchat/gateway:${{ steps.tag.outputs.tag }}, ${{ env.REGISTRY }}/matterchat/gateway:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

      - name: Build & push web
        if: steps.filter.outputs.web == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/matterchat/web:${{ steps.tag.outputs.tag }}, ${{ env.REGISTRY }}/matterchat/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Update manifests & commit
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (steps.filter.outputs.api == 'true' || steps.filter.outputs.gateway == 'true' || steps.filter.outputs.web == 'true' || steps.filter.outputs.db-migration == 'true')
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Navigate into the submodule directory to perform git operations inside its repository
          cd infra/kubernetes

          # Configure git inside the submodule
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Checkout the target branch
          git checkout main || git checkout -b main

          # Replace old tags only for components that were built
          if [ "${{ steps.filter.outputs.api }}" = "true" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/matterchat/api:.*|image: ${{ env.REGISTRY }}/matterchat/api:${TAG}|g" api.yaml
            git add api.yaml
          fi
          if [ "${{ steps.filter.outputs.gateway }}" = "true" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/matterchat/gateway:.*|image: ${{ env.REGISTRY }}/matterchat/gateway:${TAG}|g" gateway.yaml
            git add gateway.yaml
          fi
          if [ "${{ steps.filter.outputs.web }}" = "true" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/matterchat/web:.*|image: ${{ env.REGISTRY }}/matterchat/web:${TAG}|g" web.yaml
            git add web.yaml
          fi
          if [ "${{ steps.filter.outputs.db-migration }}" = "true" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/matterchat/db-migration:.*|image: ${{ env.REGISTRY }}/matterchat/db-migration:${TAG}|g" migration-job.yaml
            git add migration-job.yaml
          fi

          # Commit and push directly to the kubernetes repo
          if ! git diff --staged --quiet; then
            git commit -m "chore(gitops): update image tags to ${TAG}"
            # Authenticate the push by embedding the PAT token in the remote URL
            git remote set-url origin "https://x-access-token:${{ secrets.SUBMODULE_ACCESS_TOKEN }}@github.com/Matterchat/kubernetes.git"
            git push origin main
          fi
